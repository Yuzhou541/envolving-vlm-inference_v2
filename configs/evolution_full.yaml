eval_config: configs/charxiv_qwen3vl_2b.yaml
method: full_evochartcode
split: evolution_dev
limit: null
generations: 8
candidates_per_generation: 8
population_size: 16
runtime_weight: 0.05
seed: 0
output_dir: outputs/evolution_full
seed_policy:
  schema:
    optional_fields:
      - uncertainty
      - provenance
  extractor:
    prompt_style: strict_json
    include_uncertainty: true
  selector:
    max_serialized_chars: 4096
    include_provenance: true
  reasoner:
    mode: full_evochartcode
    max_answer_tokens: 128
  verifier:
    min_confidence: 0.4
    numeric_rel_tol: 0.05
    rules:
      - legend
      - colorbar
      - trend
